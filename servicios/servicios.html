<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=1360, initial-scale=1.0, user-scalable=no"
    />
    <title>Administrador de Servicios</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jQuery (utilidad para llamadas AJAX) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Font Awesome opcional para iconos extras (opcional) -->
    <script type="module" defer src="servicios.js"></script>
    <script src="../config.js"></script>
    <script src="../session.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="servicios.css" />
  </head>
  <body>
    <div class="app-container">
      <header
        style="background-color: #242424; border-bottom: 1px solid #3f3f3f"
      >
        <div class="flex justify-between items-center h-full">
          <div>
            <h1 class="text-xl font-bold text-white">
              Administración de Precios - Servicios
            </h1>
            <p class="text-gray-400 text-sm mt-1">
              Gestión de tarifas: Baños, Duchas, Andenes, Parking
            </p>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-secondary text-md" id="refreshPricesBtn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"
                ></path>
                <path d="M21 3v5h-5"></path>
                <path
                  d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"
                ></path>
                <path d="M8 16H3v5"></path>
              </svg>
              Refrescar Precios
            </button>
            <button
              class="btn btn-secondary text-md"
              onclick="window.location.href = '../dashboard.html'"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
              Volver
            </button>
          </div>
        </div>
      </header>

      <main>
        <div
          class="content-box"
          style="background-color: #1a1a1a; border: 1px solid #3f3f3f"
        >
          <!-- Grid de servicios para modificar precios -->
          <div class="services-pricing-grid" id="servicesGrid">
            <!-- Los servicios se inyectarán dinámicamente con JS -->
            <div class="text-center text-gray-400 col-span-full py-10">
              Cargando precios de servicios...
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
